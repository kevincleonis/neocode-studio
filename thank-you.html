<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Neocode Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Space Grotesk', sans-serif; background: #0a0a0a; color: #e8e8e8; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        .container { max-width: 500px; }
        .icon { font-size: 64px; color: #00ff88; margin-bottom: 32px; text-shadow: 0 0 40px rgba(0,255,136,0.3); }
        h1 { font-size: 40px; font-weight: 700; margin-bottom: 16px; }
        h1 .accent { color: #00ff88; text-shadow: 0 0 30px rgba(0,255,136,0.3); }
        p { font-size: 17px; color: #999; line-height: 1.8; margin-bottom: 32px; }
        .btn { display: inline-flex; align-items: center; gap: 12px; padding: 18px 36px; border-radius: 100px; font-size: 12px; font-weight: 600; text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; background: #00ff88; color: #0a0a0a; box-shadow: 0 0 30px rgba(0,255,136,0.15); transition: all 0.3s ease; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 0 60px rgba(0,255,136,0.25); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon"><i class="fas fa-check-circle"></i></div>
        <h1>Message <span class="accent">received</span>.</h1>
        <p>Thanks for reaching out! We'll review your website and get back to you within 24 hours with your free audit.</p>
        <a href="index.html" class="btn">Back to Home <i class="fas fa-arrow-right"></i></a>
    </div>
</body>
</html>
